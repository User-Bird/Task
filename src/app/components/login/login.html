<div class="login-wrapper">
  <div class="login-card">
    <h1>TaskBoard</h1>
    <h2>Connexion</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="ahmed@mail.com" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="error">Email invalide</span>
        }
      </div>

      <div class="field">
        <label>Mot de passe</label>
        <input type="password" formControlName="password" placeholder="••••••" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="error">Minimum 6 caractères</span>
        }
      </div>

      @if (errorMsg) {
        <div class="alert-error">{{ errorMsg }}</div>
      }

      <button type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="link">Pas de compte ? <a routerLink="/register">S'inscrire</a></p>
  </div>
</div>
